name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://tmaratos.github.io/OakRidgeSquadronContacts/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /OakRidgeSquadronContacts/

      - name: Add SPA fallback and disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Point GitHub Pages at gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -f build_type=legacy \
            -f "source[branch]=gh-pages" \
            -f "source[path]=/"

      - name: Deploy production build to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          single-commit: true
