name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Skip bot commits that only refresh production artifacts at repo root.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event.head_commit.message != '' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /OakRidgeSquadronContacts/

      - name: Publish production build to repo root
        run: |
          cp dist/index.vite.html index.html
          cp dist/index.vite.html 404.html
          rm -rf assets
          cp -r dist/assets assets
          cp dist/manifest.json manifest.json
          cp dist/manifest.json public/manifest.json
          cp dist/sw.js sw.js
          cp dist/sw.js public/sw.js
          cp dist/squadron-logo.svg public/squadron-logo.svg
          touch .nojekyll

      - name: Commit production artifacts for branch Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets .nojekyll manifest.json sw.js public/manifest.json public/sw.js public/squadron-logo.svg
          git diff --staged --quiet && echo "No production artifact changes" && exit 0
          git commit -m "chore: publish production build to repo root for GitHub Pages [skip ci] #TN-170"
          git push
