name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /OakRidgeSquadronContacts/

      - name: Publish production build to docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp dist/index.html docs/index.html
          cp dist/404.html docs/404.html
          cp -r dist/assets docs/assets
          cp dist/manifest.json docs/manifest.json
          cp dist/squadron-logo.svg docs/squadron-logo.svg
          touch docs/.nojekyll

      - name: Point GitHub Pages at main/docs
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          gh api --method PUT "repos/${{ github.repository }}/pages" \
            -f build_type=legacy \
            -f "source[branch]=main" \
            -f "source[path]=/docs"

      - name: Commit docs/ for branch-based Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet && echo "No docs changes to commit" && exit 0
          git commit -m "chore: publish production build to docs/ for GitHub Pages #TN-170"
          git push
